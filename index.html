<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SSVEP 実験選択 (4方向高精度計測版)</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 15%;
      font-size: 48px;
    }

    .menu-button {
      display: inline-block;
      margin: 40px;
      padding: 20px 60px;
      font-size: 32px;
      background-color: #333;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .menu-button:hover {
      background-color: #666;
    }

    #experiment-container {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 正方形刺激（4方向配置用にサイズと位置を調整） */
    .square {
      width: 220px;
      height: 220px;
      background-color: black;
      position: absolute;
      border: 4px solid transparent;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    /* PCでの視認用赤枠 */
    .square:hover {
      border: 4px solid red;
    }

    /* 十字配置 */
    #top {
      top: calc(50% - 280px);
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #bottom {
      top: calc(50% + 280px);
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #left {
      top: 50%;
      left: calc(50% - 320px);
      transform: translate(-50%, -50%);
    }

    #right {
      top: 50%;
      left: calc(50% + 320px);
      transform: translate(-50%, -50%);
    }
    
    #arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      font-size: 100px;
      transform: translate(-50%, -50%);
      visibility: hidden;
    }

    #countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
    }

    /* === 結果表示パネル === */
    #results-panel {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      background-color: rgba(30, 30, 30, 0.95);
      padding: 30px 50px;
      border-radius: 12px;
      border: 2px solid #555;
      max-height: 50vh;
      overflow-y: auto;
      display: none;
      text-align: left;
      min-width: 500px;
      box-shadow: 0px 4px 25px rgba(255, 0, 0, 0.2);
      z-index: 999;
    }

    #results-panel h2 {
      margin-top: 0;
      text-align: center;
      font-size: 28px;
      border-bottom: 2px solid #555;
      padding-bottom: 12px;
      color: #ff4d4d;
    }

    #results-list {
      list-style: none;
      padding: 0;
      margin: 15px 0;
    }

    #results-list li {
      margin: 14px 0;
      font-family: monospace;
      border-bottom: 1px dashed #444;
      padding-bottom: 8px;
      font-size: 20px;
    }

    #restart-btn, #back-btn {
      position: absolute;
      font-size: 24px;
      background-color: #444;
      color: white;
      padding: 12px 35px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      z-index: 1000;
    }

    #restart-btn {
      top: 78%;
      left: calc(50% - 180px);
    }

    #back-btn {
      top: 78%;
      left: calc(50% + 180px);
    }

    #restart-btn:hover, #back-btn:hover {
      background-color: #666;
    }
  </style>
</head>
<body>
  <!-- === 実験選択画面 === -->
  <div id="menu">
    <h1>実験を選択してください</h1>
    <button class="menu-button" id="exp1-btn">実験1 (単独点滅)</button>
    <button class="menu-button" id="exp2-btn">実験2 (同時点滅)</button>
  </div>

  <!-- === 実験画面 === -->
  <div id="experiment-container">
    <div id="top" class="square"></div>
    <div id="right" class="square"></div>
    <div id="bottom" class="square"></div>
    <div id="left" class="square"></div>
    <div id="arrow"></div>
    <div id="countdown"></div>
    
    <!-- 結果表示パネル -->
    <div id="results-panel">
      <h2>実験結果 (3秒間の注視率)</h2>
      <ul id="results-list"></ul>
    </div>

    <button id="restart-btn">もう一度実験を行う</button>
    <button id="back-btn">実験選択に戻る</button>
  </div>

  <script>
    const menu = document.getElementById("menu");
    const container = document.getElementById("experiment-container");
    const arrow = document.getElementById("arrow");
    const countdown = document.getElementById("countdown");
    const resultsPanel = document.getElementById("results-panel");
    const resultsList = document.getElementById("results-list");
    const restartBtn = document.getElementById("restart-btn");
    const backBtn = document.getElementById("back-btn");

    // 4方向ターゲットの設定情報
    const TARGETS = {
      top:    { element: document.getElementById("top"),    freq: 6,  label: "上", arrow: "↑" },
      right:  { element: document.getElementById("right"),  freq: 8,  label: "右", arrow: "→" },
      bottom: { element: document.getElementById("bottom"), freq: 15, label: "下", arrow: "↓" },
      left:   { element: document.getElementById("left"),   freq: 20, label: "左", arrow: "←" }
    };

    let currentExperiment = null;
    let experimentResults = [];

    // タッチイベントの設定
    Object.keys(TARGETS).forEach(key => {
      const el = TARGETS[key].element;
      el.addEventListener("touchstart", () => { el.dataset.touched = "true"; el.style.border = "4px solid red"; });
      el.addEventListener("touchend", () => { el.dataset.touched = "false"; el.style.border = "4px solid transparent"; });
    });

    // 判定関数
    function isTargetLookedAt(element) {
      const isHovered = element.matches(':hover');
      const isTouched = element.dataset.touched === "true";
      return isHovered || isTouched;
    }

    // メニュー選択
    document.getElementById("exp1-btn").onclick = () => startExperiment(1);
    document.getElementById("exp2-btn").onclick = () => startExperiment(2);

    function startExperiment(n) {
      currentExperiment = n;
      menu.style.display = "none";
      container.style.display = "block";
      runExperiment();
    }

    // 安静・カウントダウン
    function rest(duration, label = "安静") {
      return new Promise(resolve => {
        countdown.textContent = label;
        setTimeout(() => {
          countdown.textContent = "";
          resolve();
        }, duration);
      });
    }

    function showCountdown(seconds) {
      return new Promise(resolve => {
        let count = seconds;
        countdown.textContent = count;
        const timer = setInterval(() => {
          count--;
          if (count > 0) countdown.textContent = count;
          else {
            clearInterval(timer);
            countdown.textContent = "";
            resolve();
          }
        }, 1000);
      });
    }

    // ===== 実験1：単独点滅 (指定した1箇所のみ点滅) =====
    async function startSingleFlicker(targetKey, duration) {
      return new Promise(resolve => {
        let t0 = performance.now();
        const target = TARGETS[targetKey];
        
        arrow.textContent = target.arrow;
        arrow.style.visibility = "visible";

        let matchTime = 0;
        let lastTimestamp = t0;

        function animate(timestamp) {
          const t = (timestamp - t0) / 1000;
          
          // 対象ターゲットのみ点滅
          target.element.style.backgroundColor = Math.sin(2 * Math.PI * target.freq * t) > 0 ? "white" : "black";

          // 1秒〜4秒 (中間の3秒間) のカーソル判定
          const currentElapsed = timestamp - t0;
          if (lastTimestamp - t0 < 4000 && currentElapsed > 1000) {
            let tStart = Math.max(1000, lastTimestamp - t0);
            let tEnd = Math.min(4000, currentElapsed);
            if (tEnd > tStart) {
              if (isTargetLookedAt(target.element)) {
                matchTime += (tEnd - tStart);
              }
            }
          }
          lastTimestamp = timestamp;

          if (currentElapsed < duration) {
            requestAnimationFrame(animate);
          } else {
            target.element.style.backgroundColor = "black";
            arrow.style.visibility = "hidden";
            
            const percentage = (matchTime / 3000 * 100).toFixed(1);
            experimentResults.push({
              trial: experimentResults.length + 1,
              target: target.label,
              freq: target.freq,
              percent: percentage
            });
            
            resolve();
          }
        }
        requestAnimationFrame(animate);
      });
    }

    // ===== 実験2：同時点滅 (4箇所同時に各周波数で点滅) =====
    async function startQuadFlicker(targetKey, duration) {
      return new Promise(resolve => {
        let t0 = performance.now();
        const currentTarget = TARGETS[targetKey];
        
        arrow.textContent = currentTarget.arrow;
        arrow.style.visibility = "visible";

        let matchTime = 0;
        let lastTimestamp = t0;

        function animate(timestamp) {
          const t = (timestamp - t0) / 1000;

          // 4つのターゲット全てを各自の周波数で点滅
          Object.keys(TARGETS).forEach(key => {
            const item = TARGETS[key];
            item.element.style.backgroundColor = Math.sin(2 * Math.PI * item.freq * t) > 0 ? "white" : "black";
          });

          // 1秒〜4秒 (中間の3秒間) のカーソル判定
          const currentElapsed = timestamp - t0;
          if (lastTimestamp - t0 < 4000 && currentElapsed > 1000) {
            let tStart = Math.max(1000, lastTimestamp - t0);
            let tEnd = Math.min(4000, currentElapsed);
            if (tEnd > tStart) {
              if (isTargetLookedAt(currentTarget.element)) {
                matchTime += (tEnd - tStart);
              }
            }
          }
          lastTimestamp = timestamp;

          if (currentElapsed < duration) {
            requestAnimationFrame(animate);
          } else {
            // 全ての要素を消灯
            Object.keys(TARGETS).forEach(key => {
              TARGETS[key].element.style.backgroundColor = "black";
            });
            arrow.style.visibility = "hidden";

            const percentage = (matchTime / 3000 * 100).toFixed(1);
            experimentResults.push({
              trial: experimentResults.length + 1,
              target: currentTarget.label,
              freq: currentTarget.freq,
              percent: percentage
            });

            resolve();
          }
        }
        requestAnimationFrame(animate);
      });
    }

    // ===== 実験実行メイン処理 =====
    async function runExperiment() {
      // 画面要素の初期表示設定
      Object.keys(TARGETS).forEach(key => {
        TARGETS[key].element.style.display = "block";
        TARGETS[key].element.style.backgroundColor = "black";
      });
      arrow.style.visibility = "hidden";
      
      restartBtn.style.display = "none";
      backBtn.style.display = "none";
      resultsPanel.style.display = "none";
      resultsList.innerHTML = "";
      experimentResults = [];

      countdown.textContent = "安静";
      await rest(5000);
      await showCountdown(5);

      const targetOrder = ["top", "right", "bottom", "left"];

      if (currentExperiment === 1) {
        // 実験1：順番に単独点滅
        for (let i = 0; i < targetOrder.length; i++) {
          await startSingleFlicker(targetOrder[i], 5000);
          if (i < targetOrder.length - 1) await rest(3000);
        }
      } else if (currentExperiment === 2) {
        // 実験2：4方向同時点滅の中で指示されたターゲットを注視
        for (let i = 0; i < targetOrder.length; i++) {
          await startQuadFlicker(targetOrder[i], 5000);
          if (i < targetOrder.length - 1) await rest(3000);
        }
      }

      // ===== 実験終了処理 =====
      countdown.textContent = "実験終了";
      
      // 結果表示のために刺激枠を非表示化
      Object.keys(TARGETS).forEach(key => {
        TARGETS[key].element.style.display = "none";
      });
      arrow.style.visibility = "hidden";

      // 結果リスト生成
      experimentResults.forEach(res => {
        const li = document.createElement("li");
        li.innerHTML = `試行 ${res.trial}: ターゲット [<strong>${res.target}</strong> (${res.freq}Hz)] ➔ 注視成功率: <strong style="color: #ff4d4d;">${res.percent}%</strong>`;
        resultsList.appendChild(li);
      });

      // パネル表示
      resultsPanel.style.display = "block";
      restartBtn.style.display = "block";
      backBtn.style.display = "block";
    }

    restartBtn.onclick = () => {
      countdown.textContent = "";
      runExperiment();
    };

    backBtn.onclick = () => {
      container.style.display = "none";
      menu.style.display = "block";
      countdown.textContent = "";
    };
  </script>
</body>
</html>
