<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SSVEP 実験選択 (高精度計測・修正版)</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 15%;
      font-size: 48px;
    }

    .menu-button {
      display: inline-block;
      margin: 40px;
      padding: 20px 60px;
      font-size: 32px;
      background-color: #333;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .menu-button:hover {
      background-color: #666;
    }

    #experiment-container {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .square {
      width: 300px;
      height: 300px;
      background-color: black;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 4px solid transparent;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    /* PCでの視認用赤枠 */
    .square:hover {
      border: 4px solid red;
    }

    #left {
      left: calc(50% - 400px);
    }

    #right {
      left: calc(50% + 100px);
    }
    
    #arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      font-size: 100px;
      transform: translate(-50%, -50%);
      visibility: hidden;
    }

    #countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
    }

    /* === 結果表示パネル（重なりと表示不具合を修正） === */
    #results-panel {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      background-color: rgba(30, 30, 30, 0.95);
      padding: 30px 50px;
      border-radius: 12px;
      border: 2px solid #555;
      max-height: 50vh;
      overflow-y: auto;
      display: none; /* visibilityからdisplay方式に変更して確実化 */
      text-align: left;
      min-width: 500px;
      box-shadow: 0px 4px 25px rgba(255, 0, 0, 0.2);
      z-index: 999; /* 最前面に配置 */
    }

    #results-panel h2 {
      margin-top: 0;
      text-align: center;
      font-size: 28px;
      border-bottom: 2px solid #555;
      padding-bottom: 12px;
      color: #ff4d4d;
    }

    #results-list {
      list-style: none;
      padding: 0;
      margin: 15px 0;
    }

    #results-list li {
      margin: 14px 0;
      font-family: monospace;
      border-bottom: 1px dashed #444;
      padding-bottom: 8px;
      font-size: 20px;
    }

    #restart-btn, #back-btn {
      position: absolute;
      font-size: 24px;
      background-color: #444;
      color: white;
      padding: 12px 35px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      z-index: 1000;
    }

    #restart-btn {
      top: 78%;
      left: calc(50% - 180px);
    }

    #back-btn {
      top: 78%;
      left: calc(50% + 180px);
    }

    #restart-btn:hover, #back-btn:hover {
      background-color: #666;
    }
  </style>
</head>
<body>
  <!-- === 実験選択画面 === -->
  <div id="menu">
    <h1>実験を選択してください</h1>
    <button class="menu-button" id="exp1-btn">実験1</button>
    <button class="menu-button" id="exp2-btn">実験2</button>
  </div>

  <!-- === 実験画面 === -->
  <div id="experiment-container">
    <div id="left" class="square"></div>
    <div id="right" class="square"></div>
    <div id="arrow"></div>
    <div id="countdown"></div>
    
    <!-- 結果表示パネル -->
    <div id="results-panel">
      <h2>実験結果 (3秒間の注視率)</h2>
      <ul id="results-list"></ul>
    </div>

    <button id="restart-btn">もう一度実験を行う</button>
    <button id="back-btn">実験選択に戻る</button>
  </div>

  <script>
    const menu = document.getElementById("menu");
    const container = document.getElementById("experiment-container");
    const left = document.getElementById("left");
    const right = document.getElementById("right");
    const arrow = document.getElementById("arrow");
    const countdown = document.getElementById("countdown");
    const resultsPanel = document.getElementById("results-panel");
    const resultsList = document.getElementById("results-list");
    const restartBtn = document.getElementById("restart-btn");
    const backBtn = document.getElementById("back-btn");

    let currentExperiment = null;
    let experimentResults = [];

    // === iPhoneなどのタッチ状態を確実に保持するためのカスタムデータ属性 ===
    left.addEventListener("touchstart", (e) => { left.dataset.touched = "true"; left.style.border = "4px solid red"; });
    left.addEventListener("touchend", () => { left.dataset.touched = "false"; left.style.border = "4px solid transparent"; });
    right.addEventListener("touchstart", (e) => { right.dataset.touched = "true"; right.style.border = "4px solid red"; });
    right.addEventListener("touchend", () => { right.dataset.touched = "false"; right.style.border = "4px solid transparent"; });

    // === 【最重要】高速点滅時でもブラウザの状態を直接引っこ抜く判定関数 ===
    function isTargetLookedAt(element) {
      // PCの場合：現在のマウス位置が要素上にあるかをリアルタイム判定
      const isHovered = element.matches(':hover');
      // スマホの場合：タッチ中フラグを判定
      const isTouched = element.dataset.touched === "true";
      return isHovered || isTouched;
    }

    // ===== 実験選択 =====
    document.getElementById("exp1-btn").onclick = () => startExperiment(1);
    document.getElementById("exp2-btn").onclick = () => startExperiment(2);

    function startExperiment(n) {
      currentExperiment = n;
      menu.style.display = "none";
      container.style.display = "block";
      runExperiment();
    }

    // ===== 安静・カウントダウン共通関数 =====
    function rest(duration, label = "安静") {
      return new Promise(resolve => {
        countdown.textContent = label;
        setTimeout(() => {
          countdown.textContent = "";
          resolve();
        }, duration);
      });
    }

    function showCountdown(seconds) {
      return new Promise(resolve => {
        let count = seconds;
        countdown.textContent = count;
        const timer = setInterval(() => {
          count--;
          if (count > 0) countdown.textContent = count;
          else {
            clearInterval(timer);
            countdown.textContent = "";
            resolve();
          }
        }, 1000);
      });
    }

    // ===== 実験1：片側点滅 =====
    async function startFlicker(element, freq, duration, direction) {
      return new Promise(resolve => {
        let t0 = performance.now();
        arrow.textContent = direction === "left" ? "←" : "→";
        arrow.style.visibility = "visible";

        let matchTime = 0;
        let lastTimestamp = t0;

        function animate(timestamp) {
          const t = (timestamp - t0) / 1000;
          
          // 点滅ロジック
          element.style.backgroundColor = Math.sin(2 * Math.PI * freq * t) > 0 ? "white" : "black";

          // 1秒〜4秒 (中間の3秒間) のカーソル判定
          const currentElapsed = timestamp - t0;
          if (lastTimestamp - t0 < 4000 && currentElapsed > 1000) {
            let tStart = Math.max(1000, lastTimestamp - t0);
            let tEnd = Math.min(4000, currentElapsed);
            if (tEnd > tStart) {
              if (isTargetLookedAt(element)) {
                matchTime += (tEnd - tStart);
              }
            }
          }
          lastTimestamp = timestamp;

          if (currentElapsed < duration) {
            requestAnimationFrame(animate);
          } else {
            element.style.backgroundColor = "black";
            arrow.style.visibility = "hidden";
            
            const percentage = (matchTime / 3000 * 100).toFixed(1);
            experimentResults.push({
              trial: experimentResults.length + 1,
              target: direction === "left" ? "左" : "右",
              freq: freq,
              percent: percentage
            });
            
            resolve();
          }
        }
        requestAnimationFrame(animate);
      });
    }

    // ===== 実験2：同時点滅 =====
    async function startDualFlicker(leftFreq, rightFreq, duration, direction) {
      return new Promise(resolve => {
        let t0 = performance.now();
        arrow.textContent = direction === "left" ? "←" : "→";
        arrow.style.visibility = "visible";

        let matchTime = 0;
        let lastTimestamp = t0;

        function animate(timestamp) {
          const t = (timestamp - t0) / 1000;
          left.style.backgroundColor = Math.sin(2 * Math.PI * leftFreq * t) > 0 ? "white" : "black";
          right.style.backgroundColor = Math.sin(2 * Math.PI * rightFreq * t) > 0 ? "white" : "black";

          // 1秒〜4秒 (中間の3秒間) のカーソル判定
          const currentElapsed = timestamp - t0;
          if (lastTimestamp - t0 < 4000 && currentElapsed > 1000) {
            let tStart = Math.max(1000, lastTimestamp - t0);
            let tEnd = Math.min(4000, currentElapsed);
            if (tEnd > tStart) {
              const targetElement = direction === "left" ? left : right;
              if (isTargetLookedAt(targetElement)) {
                matchTime += (tEnd - tStart);
              }
            }
          }
          lastTimestamp = timestamp;

          if (timestamp - t0 < duration) {
            requestAnimationFrame(animate);
          } else {
            left.style.backgroundColor = "black";
            right.style.backgroundColor = "black";
            arrow.style.visibility = "hidden";

            const percentage = (matchTime / 3000 * 100).toFixed(1);
            const activeFreq = direction === "left" ? leftFreq : rightFreq;
            experimentResults.push({
              trial: experimentResults.length + 1,
              target: direction === "left" ? "左" : "右",
              freq: activeFreq,
              percent: percentage
            });

            resolve();
          }
        }
        requestAnimationFrame(animate);
      });
    }

    // ===== 実験実行 =====
    async function runExperiment() {
      // 画面要素の初期化（表示を元に戻す）
      left.style.display = "block";
      right.style.display = "block";
      arrow.style.visibility = "hidden";
      
      restartBtn.style.display = "none";
      backBtn.style.display = "none";
      resultsPanel.style.display = "none";
      resultsList.innerHTML = "";
      experimentResults = [];

      countdown.textContent = "安静";
      await rest(5000);
      await showCountdown(5);

      if (currentExperiment === 1) {
        await startFlicker(left, 5, 5000, "left");
        await rest(3000);
        await startFlicker(right, 12, 5000, "right");
        await rest(3000);
        await startFlicker(left, 6, 5000, "left");
        await rest(3000);
        await startFlicker(right, 10, 5000, "right");
      } else if (currentExperiment === 2) {
        await startDualFlicker(5, 12, 5000, "left");
        await rest(3000);
        await startDualFlicker(5, 12, 5000, "right");
        await rest(5000);
        await showCountdown(5);
        await startDualFlicker(6, 10, 5000, "left");
        await rest(3000);
        await startDualFlicker(6, 10, 5000, "right");
      }

      // ===== 実験終了後の結果画面表示 =====
      countdown.textContent = "実験終了";
      
      // 結果表示の邪魔にならないよう、実験刺激要素を一時的に非表示にする
      left.style.display = "none";
      right.style.display = "none";
      arrow.style.visibility = "hidden";

      // データをリストにして生成
      experimentResults.forEach(res => {
        const li = document.createElement("li");
        li.innerHTML = `試行 ${res.trial}: ターゲット [<strong>${res.target}</strong> (${res.freq}Hz)] ➔ 注視成功率: <strong style="color: #ff4d4d;">${res.percent}%</strong>`;
        resultsList.appendChild(li);
      });

      // 結果パネルとボタンを表示
      resultsPanel.style.display = "block";
      restartBtn.style.display = "block";
      backBtn.style.display = "block";
    }

    restartBtn.onclick = () => {
      countdown.textContent = "";
      runExperiment();
    };

    backBtn.onclick = () => {
      container.style.display = "none";
      menu.style.display = "block";
      countdown.textContent = "";
    };
  </script>
</body>
</html>
